name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bun:
    name: Bun test and publish gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check forbidden tracked files
        shell: bash
        run: |
          set -euo pipefail

          forbidden_regex='(^|/)(logs|workspaces|node_modules)(/|$)|(^|/)\.env($|\.)|(^|/).*\.db(-wal|-shm)?$|(^|/).*\.sqlite3?$'
          allow_regex='(^|/)\.env\.example$'
          matches="$(
            git ls-files |
              awk -v forbidden="$forbidden_regex" -v allow="$allow_regex" \
                '$0 ~ forbidden && $0 !~ allow { print }'
          )"

          if [[ -n "$matches" ]]; then
            echo "::error::Forbidden publish files are tracked:"
            echo "$matches"
            exit 1
          fi

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Check whitespace
        run: git diff --check
