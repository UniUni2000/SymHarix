profiles:
  - coding
  - review

commands:
  setup: bun install
  dev: bun run dev
  test: bun test
  build: bun run build
  review_checks: bun test src/agent/supervisor.test.ts src/runtime/hub.test.ts src/change-pack/service.test.ts

artifacts:
  - dist/index.js
  - src/orchestrator/index.ts
  - src/runtime/page.ts
  - src/server/routes/runtime.ts

verification:
  required_commands:
    - test
    - build
  required_artifacts:
    - dist/index.js

runtime_hints:
  url: http://localhost:8080/runtime
  ready_log:
    - "[orchestrator] Started"
    - "Symphony Server started on"
